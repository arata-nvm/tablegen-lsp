name: Build LLVM

on:
  workflow_dispatch:

jobs:
  build-llvm:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-linux-gnu
            arch: X64
            os_name: Linux
          - os: ubuntu-24.04-arm
            target: aarch64-linux-gnu
            arch: ARM64
            os_name: Linux
          - os: macos-latest
            target: aarch64-apple-darwin
            arch: ARM64
            os_name: macOS
          - os: windows-2025
            target: x86_64-pc-windows-msvc
            arch: x86_64
            os_name: Windows
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            arch: aarch64
            os_name: Windows

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Read LLVM version
        id: llvm_version
        shell: bash
        run: |
          version=$(cat .github/LLVM_VERSION | tr -d '\r\n')
          echo "version=${version}" >> $GITHUB_OUTPUT

      - name: Download LLVM Source
        shell: bash
        run: |
          version="${{ steps.llvm_version.outputs.version }}"
          curl -LO "https://github.com/llvm/llvm-project/releases/download/llvmorg-${version}/llvm-project-${version}.src.tar.xz"
          mkdir llvm-project
          # Ignore errors since it fails on Windows
          tar -xf "llvm-project-${version}.src.tar.xz" -C llvm-project --strip-components 1 || true

      - name: Configure
        shell: bash
        run: |
          cd llvm-project
          
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            generator_args=()
          else
            generator_args=(-G Ninja)
          fi

          cmake -S llvm -B build "${generator_args[@]}" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=$(pwd)/install \
            -DLLVM_ENABLE_DUMP=ON \
            -DLLVM_ENABLE_PROJECTS="" \
            -DLLVM_TARGETS_TO_BUILD="" \
            -DLLVM_INCLUDE_EXAMPLES=OFF \
            -DLLVM_INCLUDE_DOCS=OFF \
            -DLLVM_INCLUDE_BENCHMARKS=OFF \
            -DLLVM_INCLUDE_TESTS=OFF \
            -DLLVM_ENABLE_PLUGINS=OFF \
            -DLLVM_ENABLE_ZLIB=OFF \
            -DLLVM_ENABLE_ZSTD=OFF \
            -DLLVM_ENABLE_LIBXML2=OFF \
            -DLLVM_ENABLE_CURL=OFF \
            -DLLVM_ENABLE_HTTPLIB=OFF

      - name: Build
        shell: bash
        run: |
          cd llvm-project
          cmake --build build --config Release

      - name: Install
        shell: bash
        run: |
          cd llvm-project
          cmake --install build --config Release

      - name: Package
        id: package
        shell: bash
        run: |
          cd llvm-project/install
          version="${{ steps.llvm_version.outputs.version }}"
          filename="LLVM-${version}-${{ runner.os }}-${{ runner.arch }}.tar.xz"
          tar -cJf "../${filename}" *
          echo "asset_path=llvm-project/${filename}" >> $GITHUB_OUTPUT

      - name: Generate attestation
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: ${{ steps.package.outputs.asset_path }}

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: llvm-${{ matrix.target }}
          path: ${{ steps.package.outputs.asset_path }}
          if-no-files-found: error

  publish:
    needs: ["build-llvm"]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Read LLVM version
        id: llvm_version
        shell: bash
        run: |
          version=$(cat .github/LLVM_VERSION | tr -d '\r\n')
          echo "version=${version}" >> $GITHUB_OUTPUT

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: llvm-*
          path: ./dist
          merge-multiple: true

      - name: Verify attestations
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          signer_workflow="${GITHUB_SERVER_URL#https://}/${GITHUB_REPOSITORY}/.github/workflows/build-llvm.yml"
          for file in dist/*.tar.xz; do
            gh attestation verify "${file}" \
              --repo "${GITHUB_REPOSITORY}" \
              --signer-workflow "${signer_workflow}" \
              --source-ref "${GITHUB_REF}"
          done

      - name: Create draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          tag="llvm-${{ steps.llvm_version.outputs.version }}"
          gh release create "${tag}" dist/*.tar.xz --draft --title "LLVM ${{ steps.llvm_version.outputs.version }}"

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          tag="llvm-${{ steps.llvm_version.outputs.version }}"
          gh release edit "${tag}" --draft=false

      - name: Delete draft release on failure
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          tag="llvm-${{ steps.llvm_version.outputs.version }}"
          is_draft="$(gh release view "${tag}" --json isDraft --jq .isDraft 2>/dev/null || true)"
          if [[ "${is_draft}" == "true" ]]; then
            gh release delete "${tag}" --yes
          fi
