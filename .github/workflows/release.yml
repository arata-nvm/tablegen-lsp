name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: true

      - name: Get the release version from the tag
        id: version
        shell: bash
        run: |
          echo "VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
          echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Check that tag version and Cargo.toml version are the same
        shell: bash
        run: |
          if ! grep -q "version = \"${VERSION}\"" Cargo.toml; then
            echo "version does not match Cargo.toml" >&2
            exit 1
          fi

      - name: Check that tag version and package.json version are the same
        shell: bash
        run: |
          if ! grep -q "\"version\": \"${VERSION}\"," vscode/package.json; then
            echo "version does not match package.json" >&2
            exit 1
          fi

    outputs:
      version: ${{ steps.version.outputs.version }}

  build-server:
    needs: ["prepare-release"]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    env:
      CROSS_VERSION: v0.2.5
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            ext: ""
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ""
          - os: windows-2025
            target: x86_64-pc-windows-msvc
            ext: ".exe"
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}

      - name: Install LLVM
        uses: ./.github/actions/setup-llvm

      - name: Build release binary
        shell: bash
        run: |
          cargo build --release --locked --target ${{ matrix.target }} --verbose
          mkdir -p dist
          mv "target/${{ matrix.target }}/release/lsp${{ matrix.ext }}" \
            "dist/tablegen-lsp-${{ needs.prepare-release.outputs.version }}-${{ matrix.target }}${{ matrix.ext }}"

      - name: Generate attestation
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: dist/tablegen-lsp-${{ needs.prepare-release.outputs.version }}-${{ matrix.target }}${{ matrix.ext }}

      - name: Upload server artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: server-${{ matrix.target }}
          path: dist/tablegen-lsp-${{ needs.prepare-release.outputs.version }}-${{ matrix.target }}${{ matrix.ext }}
          if-no-files-found: error

  build-client:
    needs: ["prepare-release", "build-server"]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    defaults:
      run:
        working-directory: ./vscode
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: true

      - name: Install Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Download server artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: server-*
          path: ./vscode/server
          merge-multiple: true

      - name: Fix server binary permissions
        run: chmod 0755 server/*

      - name: Package client
        run: npm run package

      - name: Generate attestation
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: ${{ github.workspace }}/vscode/tablegen-lsp-${{ needs.prepare-release.outputs.version }}.vsix

      - name: Upload client artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: client-vsix
          path: ${{ github.workspace }}/vscode/tablegen-lsp-${{ needs.prepare-release.outputs.version }}.vsix
          if-no-files-found: error

  publish:
    needs: ["prepare-release", "build-server", "build-client"]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 24

      - name: Install publish dependencies
        working-directory: ./vscode
        run: npm ci

      - name: Download server artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: server-*
          path: ./dist/server
          merge-multiple: true

      - name: Download client artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: client-vsix
          path: ./dist/client

      - name: Verify attestations
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          signer_workflow="${GITHUB_SERVER_URL#https://}/${GITHUB_REPOSITORY}/.github/workflows/release.yml"
          for file in dist/server/* dist/client/*.vsix; do
            gh attestation verify "${file}" \
              --repo "${GITHUB_REPOSITORY}" \
              --signer-workflow "${signer_workflow}" \
              --source-ref "${GITHUB_REF}"
          done

      - name: Create draft release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ needs.prepare-release.outputs.version }}"
          gh release create "${version}" dist/server/* dist/client/*.vsix --draft --verify-tag --title "${version}"

      - name: Publish extension
        shell: bash
        env:
          VSCE_TOKEN: ${{ secrets.VSCE_TOKEN }}
        run: |
          version="${{ needs.prepare-release.outputs.version }}"
          npm --prefix ./vscode exec -- vsce publish --pat "${VSCE_TOKEN}" --packagePath "dist/client/tablegen-lsp-${version}.vsix"

      - name: Publish release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ needs.prepare-release.outputs.version }}"
          gh release edit "${version}" --draft=false

      - name: Delete draft release on failure
        if: failure()
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ needs.prepare-release.outputs.version }}"
          is_draft="$(gh release view "${version}" --json isDraft --jq .isDraft 2>/dev/null || true)"
          if [[ "${is_draft}" == "true" ]]; then
            gh release delete "${version}" --yes
          fi
