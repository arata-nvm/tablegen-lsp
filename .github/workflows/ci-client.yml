name: CI(client)

on:
  push:
    branches: [master]
    paths:
      - .github/workflows/**
      - vscode/**
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: true
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm ci
        working-directory: ./vscode
      - run: npm run build
        working-directory: ./vscode

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: true
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm ci
        working-directory: ./vscode
      - run: npm run check
        working-directory: ./vscode
